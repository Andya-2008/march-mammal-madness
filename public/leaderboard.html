<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — March Mammal Madness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="no-print">
    <h1>Leaderboard</h1>
    <p>Rankings based on actual March Mammal Madness results</p>
    <nav class="top-nav">
      <a href="/">My Bracket</a>
      <a href="/leaderboard.html" class="nav-active">Leaderboard</a>
    </nav>
  </header>

  <main>
    <div id="alert"></div>

    <section class="card no-print">
      <div class="leaderboard-toolbar">
        <div class="leaderboard-filter">
          <label for="gradeFilter">Show rankings for</label>
          <select id="gradeFilter">
            <option value="">Everyone</option>
            <option value="9">Grade 9</option>
            <option value="10">Grade 10</option>
            <option value="11">Grade 11</option>
            <option value="12">Grade 12</option>
            <option value="Staff">Staff</option>
          </select>
        </div>
        <div class="actions">
          <button class="btn btn-primary" id="refreshBtn">Refresh Rankings</button>
          <button class="btn btn-secondary" id="csvBtn" disabled>Download CSV</button>
          <button class="btn btn-secondary" onclick="window.print()">Print Page</button>
        </div>
      </div>
    </section>

    <section class="card" id="print-section">
      <h2 id="leaderboard-title">Leaderboard</h2>
      <p id="meta" class="leaderboard-date"></p>
      <table>
        <thead>
          <tr>
            <th>Rank</th>
            <th>Name</th>
            <th>Grade</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
      </table>
    </section>
  </main>

  <script src="/js/leaderboard.js"></script>
</body>
</html>
